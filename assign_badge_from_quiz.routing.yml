assign_badge_from_quiz.settings:
  path: '/admin/config/makehaven/assign-badge-from-quiz'
  defaults:
    _form: '\Drupal\assign_badge_from_quiz\Form\SettingsForm'
    _title: 'Quiz Badge Assign Configuration'
  requirements:
    _permission: 'administer site configuration'

assign_badge_from_quiz.quality_report:
  path: '/admin/reports/quiz-quality'
  defaults:
    _controller: '\Drupal\assign_badge_from_quiz\Controller\QuizQualityReportController::report'
    _title: 'Quiz Quality Report'
  requirements:
    _permission: 'administer quiz'
